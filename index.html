<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>@cyberedition — Digital Presence & Creative Impact</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />

<!-- Three.js & GSAP via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
/* ─────────────────────────────────────────────
   CSS VARIABLES & RESET
───────────────────────────────────────────── */
:root {
  --bg: #050508;
  --bg2: #080812;
  --neon-blue: #00d4ff;
  --neon-purple: #b44fff;
  --neon-cyan: #00fff7;
  --neon-pink: #ff2d78;
  --grid-color: rgba(0, 212, 255, 0.08);
  --glass: rgba(0, 212, 255, 0.04);
  --glass-border: rgba(0, 212, 255, 0.18);
  --text: #c8d8e8;
  --text-dim: rgba(200,216,232,0.5);
  --font-head: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --glow-blue: 0 0 12px #00d4ff, 0 0 40px rgba(0,212,255,0.3);
  --glow-purple: 0 0 12px #b44fff, 0 0 40px rgba(180,79,255,0.3);
  --glow-cyan: 0 0 12px #00fff7, 0 0 40px rgba(0,255,247,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;
  cursor: none;
}

/* ─────────────────────────────────────────────
   CUSTOM CURSOR
───────────────────────────────────────────── */
#cursor {
  position: fixed; top: 0; left: 0; z-index: 9999;
  pointer-events: none; mix-blend-mode: screen;
}
#cursor-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  position: absolute; transform: translate(-50%,-50%);
  transition: transform 0.08s;
}
#cursor-ring {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--neon-blue);
  position: absolute; transform: translate(-50%,-50%);
  transition: all 0.18s ease;
  box-shadow: var(--glow-blue);
}
body:has(a:hover) #cursor-ring,
body:has(button:hover) #cursor-ring {
  transform: translate(-50%,-50%) scale(1.6);
  background: rgba(0,212,255,0.08);
}

/* ─────────────────────────────────────────────
   CANVAS / THREE.JS HERO
───────────────────────────────────────────── */
#hero-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ─────────────────────────────────────────────
   GLOBAL NAV
───────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px;
  background: linear-gradient(180deg, rgba(5,5,8,0.95) 0%, transparent 100%);
  backdrop-filter: blur(2px);
}
.nav-logo {
  font-family: var(--font-head);
  font-size: 1.1rem; font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  letter-spacing: 2px;
  text-decoration: none;
}
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  text-decoration: none;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: color 0.2s, text-shadow 0.2s;
}
.nav-links a:hover { color: var(--neon-blue); text-shadow: var(--glow-blue); }

/* ─────────────────────────────────────────────
   SECTIONS BASE
───────────────────────────────────────────── */
section {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 120px 5%;
}

/* ─────────────────────────────────────────────
   HERO SECTION
───────────────────────────────────────────── */
#hero {
  flex-direction: column;
  text-align: center;
  background: transparent;
  min-height: 100vh;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--neon-purple);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 24px;
  opacity: 0;
  text-shadow: var(--glow-purple);
}

.hero-title {
  font-family: var(--font-head);
  font-size: clamp(3.5rem, 10vw, 9rem);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -2px;
  background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 40%, var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 40px rgba(0,212,255,0.5));
  opacity: 0;
  position: relative;
}

.hero-title::after {
  content: '@cyberedition';
  position: absolute; top: 0; left: 0; right: 0;
  background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 40%, var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: blur(20px) drop-shadow(0 0 60px rgba(0,212,255,0.8));
  opacity: 0.4;
  animation: flicker 4s infinite;
}

@keyframes flicker {
  0%,100%{opacity:0.4} 92%{opacity:0.4} 93%{opacity:0.1} 94%{opacity:0.4} 96%{opacity:0.2} 97%{opacity:0.4}
}

.hero-tagline {
  font-family: var(--font-body);
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 28px 0 52px;
  opacity: 0;
}

.cta-btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 16px 44px;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-cyan);
  background: transparent;
  border: 1px solid var(--neon-cyan);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  opacity: 0;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  text-decoration: none;
}
.cta-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.12), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.cta-btn:hover::before { transform: translateX(100%); }
.cta-btn:hover {
  background: rgba(0,212,255,0.08);
  box-shadow: var(--glow-blue), inset 0 0 20px rgba(0,212,255,0.05);
  text-shadow: var(--glow-blue);
}
.cta-btn svg { width: 16px; height: 16px; }

.hero-scroll-hint {
  position: absolute; bottom: 40px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase;
  opacity: 0; animation: scrollHint 3s 3s infinite;
}
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(180deg, var(--neon-blue), transparent);
  animation: scrollLine 3s 3s infinite;
}
@keyframes scrollHint { 0%,100%{opacity:0} 50%{opacity:0.6} }
@keyframes scrollLine { 0%{height:0} 50%{height:48px} 100%{height:0} }

/* ─────────────────────────────────────────────
   SECTION LABELS
───────────────────────────────────────────── */
.section-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--neon-purple);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  text-shadow: var(--glow-purple);
}
.section-title {
  font-family: var(--font-head);
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  color: #fff;
  line-height: 1.05;
  margin-bottom: 24px;
}
.section-title span {
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ─────────────────────────────────────────────
   GLASS PANEL
───────────────────────────────────────────── */
.glass {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 2px;
}
.glass-corner {
  position: relative;
}
.glass-corner::before,
.glass-corner::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: var(--neon-blue);
  border-style: solid;
}
.glass-corner::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
.glass-corner::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

/* ─────────────────────────────────────────────
   ABOUT SECTION
───────────────────────────────────────────── */
#about {
  background: linear-gradient(135deg, rgba(0,0,0,0) 0%, rgba(8,8,20,0.8) 100%);
}
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  max-width: 1100px;
  width: 100%;
  align-items: center;
}
.about-visual {
  position: relative;
  height: 420px;
  display: flex; align-items: center; justify-content: center;
}
.about-avatar {
  width: 240px; height: 240px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(180,79,255,0.15));
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: floatSlow 5s ease-in-out infinite;
}
@keyframes floatSlow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

.about-avatar::before {
  content: '';
  position: absolute; inset: -16px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,0.15);
  animation: rotateSlow 8s linear infinite;
}
.about-avatar::after {
  content: '';
  position: absolute; inset: -32px;
  border-radius: 50%;
  border: 1px dashed rgba(180,79,255,0.2);
  animation: rotateSlow 14s linear infinite reverse;
}
@keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.avatar-icon {
  font-size: 5rem;
  filter: drop-shadow(0 0 20px rgba(0,212,255,0.6));
}
.orbit-tag {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--neon-cyan);
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  padding: 4px 10px;
  border-radius: 2px;
  white-space: nowrap;
  text-shadow: var(--glow-cyan);
}

.about-content .section-label { margin-bottom: 8px; }
.about-bio {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text-dim);
  margin-bottom: 28px;
}
.about-stats {
  display: flex; gap: 32px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: var(--font-head);
  font-size: 2rem;
  font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  display: block;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   SKILLS SECTION
───────────────────────────────────────────── */
#skills {
  flex-direction: column;
  background: radial-gradient(ellipse at 50% 0%, rgba(180,79,255,0.06) 0%, transparent 60%);
}
.skills-inner { max-width: 1100px; width: 100%; text-align: center; }

#skills-canvas {
  width: 100%; height: 360px;
  margin: 40px 0;
  border-radius: 2px;
  position: relative;
}

.tools-grid {
  display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
  margin-top: 40px;
}
.tool-chip {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--neon-blue);
  border: 1px solid rgba(0,212,255,0.25);
  padding: 8px 20px;
  background: rgba(0,212,255,0.04);
  border-radius: 2px;
  letter-spacing: 2px;
  transition: all 0.3s;
  cursor: default;
}
.tool-chip:hover {
  background: rgba(0,212,255,0.1);
  box-shadow: var(--glow-blue);
  color: var(--neon-cyan);
  transform: translateY(-3px);
}

.skill-rings {
  display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
  margin: 24px 0;
}
.skill-ring {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.ring-wrap {
  position: relative; width: 120px; height: 120px;
}
.ring-wrap svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
.ring-fill {
  fill: none; stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1);
}
.ring-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 1.3rem; font-weight: 900;
}
.skill-name {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ─────────────────────────────────────────────
   PROJECTS SECTION
───────────────────────────────────────────── */
#projects {
  flex-direction: column;
  background: linear-gradient(135deg, rgba(0,0,0,0) 0%, rgba(0,8,20,0.6) 100%);
}
.projects-inner { max-width: 1200px; width: 100%; }
.projects-header { text-align: center; margin-bottom: 60px; }

.carousel-wrap {
  position: relative; overflow: hidden;
}
.carousel-track {
  display: flex; gap: 28px;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.proj-card {
  flex: 0 0 340px;
  min-height: 420px;
  padding: 32px;
  background: rgba(0,8,20,0.6);
  border: 1px solid rgba(0,212,255,0.12);
  position: relative;
  transition: all 0.4s;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}
.proj-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(0,212,255,0.03) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}
.proj-card:hover {
  border-color: rgba(0,212,255,0.35);
  transform: translateY(-8px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,212,255,0.08);
}
.proj-card:hover::before { opacity: 1; }

.proj-num {
  font-family: var(--font-head);
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(0,212,255,0.06);
  line-height: 1;
  margin-bottom: 16px;
  user-select: none;
}
.proj-tag {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--neon-purple);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-shadow: var(--glow-purple);
}
.proj-title {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 14px;
  line-height: 1.3;
}
.proj-desc {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 20px;
}
.proj-tools {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 20px;
}
.proj-tool {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  padding: 3px 8px;
  border: 1px solid rgba(180,79,255,0.3);
  color: var(--neon-purple);
  background: rgba(180,79,255,0.06);
  border-radius: 1px;
}
.proj-result {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--neon-cyan);
  border-top: 1px solid rgba(0,212,255,0.1);
  padding-top: 14px;
  text-shadow: var(--glow-cyan);
}

.carousel-controls {
  display: flex; justify-content: center; gap: 16px; margin-top: 40px;
}
.car-btn {
  width: 48px; height: 48px;
  border: 1px solid rgba(0,212,255,0.25);
  background: rgba(0,212,255,0.04);
  color: var(--neon-cyan);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  font-size: 1.2rem;
}
.car-btn:hover {
  background: rgba(0,212,255,0.12);
  box-shadow: var(--glow-blue);
}

/* ─────────────────────────────────────────────
   SERVICES SECTION
───────────────────────────────────────────── */
#services {
  flex-direction: column;
  background: radial-gradient(ellipse at 30% 50%, rgba(0,212,255,0.04) 0%, transparent 55%),
              radial-gradient(ellipse at 70% 50%, rgba(180,79,255,0.04) 0%, transparent 55%);
}
.services-inner { max-width: 1100px; width: 100%; }
.services-header { text-align: center; margin-bottom: 60px; }

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.serv-card {
  padding: 40px 32px;
  background: rgba(0,4,12,0.7);
  border: 1px solid rgba(0,212,255,0.1);
  position: relative;
  overflow: hidden;
  transition: all 0.4s;
  cursor: default;
}
.serv-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.serv-card::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.07) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
}
.serv-card:hover::before { transform: translateX(100%); }
.serv-card:hover::after { opacity: 1; }
.serv-card:hover {
  border-color: rgba(0,212,255,0.3);
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,255,0.06);
}
.serv-card:nth-child(2):hover { border-color: rgba(180,79,255,0.3); }
.serv-card:nth-child(3):hover { border-color: rgba(0,255,247,0.3); }

.serv-icon {
  font-size: 2.5rem;
  margin-bottom: 20px;
  display: block;
  filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
}
.serv-title {
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.serv-desc {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 20px;
}
.serv-list {
  list-style: none;
  display: flex; flex-direction: column; gap: 8px;
}
.serv-list li {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 1px;
  padding-left: 16px;
  position: relative;
}
.serv-list li::before {
  content: '›';
  position: absolute; left: 0;
  color: var(--neon-cyan);
}

/* ─────────────────────────────────────────────
   TESTIMONIALS
───────────────────────────────────────────── */
#testimonials {
  flex-direction: column;
  background: linear-gradient(135deg, rgba(8,0,20,0.5) 0%, rgba(0,0,0,0) 100%);
}
.testimonials-inner { max-width: 1000px; width: 100%; }
.testimonials-header { text-align: center; margin-bottom: 60px; }

.testi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.testi-card {
  padding: 32px;
  background: rgba(0,4,16,0.8);
  border: 1px solid rgba(180,79,255,0.12);
  position: relative;
  transition: all 0.4s;
}
.testi-card::before {
  content: '"';
  position: absolute; top: 16px; left: 24px;
  font-family: var(--font-head);
  font-size: 4rem;
  color: rgba(0,212,255,0.07);
  line-height: 1;
  pointer-events: none;
}
.testi-card:hover {
  border-color: rgba(180,79,255,0.3);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 20px rgba(180,79,255,0.06);
}
.testi-text {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.8;
  margin-bottom: 24px;
  position: relative; z-index: 1;
}
.testi-author {
  display: flex; align-items: center; gap: 12px;
}
.testi-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
